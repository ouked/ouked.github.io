<div class="content" id="home">
  <a href="#" id="sidebar-button" class="footer-link"><i class="fas fa-bars"></i></a>
  <div id="post-info">
    <div id="cover-photo-container">
      <img id="cover-photo" src="/images/{{ page.cover }}">
    </div>
    <div id="info-container">
      <h1 id="title">{{ page.title }}</h1>
      <span id="date">{{ page.date | date_to_string }}</span>
    </div>
  </div>

  <div class="post">
    {{ content }}
  </div>
  <div class="colophon">
    <p>
      <span id="pub-date">Published on {{ page.date | date_to_string }}</span>
      <span class="separator">&bull;</span>
      <span id="social"><a href="{{site.github}}/{{site.github_username}}.github.io">Source on GitHub</a>!</span>
    </p>
  </div>
</div>
