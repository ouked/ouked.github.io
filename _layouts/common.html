<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <title>{{ site.name }} - {{ page.title }}</title>
    <link rel="icon" type="image/x-icon" sizes="32x32" href="/favicon.ico">
    <meta name="viewport" content="width=device-width">
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <!-- syntax highlighting CSS -->
    <link rel="stylesheet" href="/css/syntax.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/main.css">
<!--    <link rel="stylesheet" href="/css/mobile.css" media="handheld">-->

    <!-- Responsive CSS -->
    <link rel="stylesheet" href="/css/responsive.css">

    <link rel="stylesheet" href="/css/dracula.css">


    <!-- Google Fonts -->
    <link href='http://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,700' rel='stylesheet' type='text/css'>
    <link href='http://fonts.googleapis.com/css?family=Raleway:300,400,700' rel='stylesheet' type='text/css'>

    <!--    Font awesome-->
    <script src="https://kit.fontawesome.com/632cc7a3b3.js" crossorigin="anonymous"></script>
    {% if jekyll.environment == 'production' %}
    {% include analytics.html %}
    {% endif %}
    {% seo %}
</head>

<body>
<div class="site">
    <div class="sidebar" id="sidebar">
        <a href="#" id="close-sidebar" class="footer-link"><i class="fas fa-window-close"></i></a>
        <div class="header">
            <h2 class="title"><a href="/"><img alt="Site logo" id="logo" src="{{ site.logo }}"></a><br>{{site.name}}</h2><br>
            <span class="tagline">{{ site.tagline }}</span>
        </div>
        <div class="posts">
            <ul class="posts-list">
                {% for post in site.posts %}
                <li class="post-link">
                    <a class="post-title" href="{{ post.url }}">
                        <span class="post-date">{{ post.date | date_to_string }}</span>
                        {{ post.title }}
                    </a>
                </li>
                {% endfor %}
            </ul>
        </div>
        <div class="footer">
          <span id="footer-links">
              <div class="social-icons">
                  <a href="{{ site.email }}" class="footer-link"><i class=" fas fa-at"></i></a>
                     <a href="{{ site.github }}" class="footer-link"><i class=" fab fa-github"></i></a>
                    <a href="{{ site.linkedin }}" class="footer-link"><i class=" fab fa-linkedin"></i></a>
              </div>

          </span>
        </div>
    </div>
    {{ content }}

</div>
<script src="/scripts/responsive.js" type="text/javascript"></script>

</body>
</html>
